<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RP Waffen Rechner</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;

  /* Schwarz-Weiß Hintergrund */
  background: linear-gradient(135deg, #000 50%, #1a1a1a 50%);
  color: #ff4d4d; /* ROTE SCHRIFT */
}

.wrapper {
  display: flex;
  gap: 20px;
}

/* Rechner */
.container {
  background: #111;
  padding: 30px;
  border-radius: 15px;
  width: 380px;
  box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

h1 {
  text-align: center;
  font-size: 26px;
  margin-bottom: 20px;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 12px 0;
  font-size: 16px;
}

.controls {
  display: flex;
  gap: 5px;
}

button {
  background: black;
  color: #ff4d4d;
  border: 1px solid #ff4d4d;
  width: 30px;
  height: 30px;
  border-radius: 6px;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #ff4d4d;
  color: black;
}

.value {
  width: 40px;
  text-align: center;
  font-size: 16px;
  color: #ff4d4d;
}

hr {
  border: 0.5px solid #444;
  margin: 20px 0;
}

/* rechte Seite */
.sidebar {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  width: 280px;
  box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

.sidebar h2 {
  text-align: center;
}

.text {
  white-space: pre-line;
  font-size: 14px;
}

/* Ergebnisse */
.result {
  text-align: center;
  font-size: 20px;
  margin-top: 10px;
}

.total {
  font-size: 22px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- LINKS -->
<div class="container">
  <h1>Waffen Rechner</h1>

  <div class="item">
    <span>Pistole (55.000$)</span>
    <div class="controls">
      <button onclick="change('pistole', -1)">-</button>
      <div class="value" id="pistoleVal">0</div>
      <button onclick="change('pistole', 1)">+</button>
    </div>
  </div>

  <div class="item">
    <span>Pistole MK2 (65.000$)</span>
    <div class="controls">
      <button onclick="change('mk2', -1)">-</button>
      <div class="value" id="mk2Val">0</div>
      <button onclick="change('mk2', 1)">+</button>
    </div>
  </div>

  <div class="item">
    <span>Deagle (80.000$)</span>
    <div class="controls">
      <button onclick="change('deagle', -1)">-</button>
      <div class="value" id="deagleVal">0</div>
      <button onclick="change('deagle', 1)">+</button>
    </div>
  </div>

  <div class="item">
    <span>Maschinen Pistole (170.000$)</span>
    <div class="controls">
      <button onclick="change('mp', -1)">-</button>
      <div class="value" id="mpVal">0</div>
      <button onclick="change('mp', 1)">+</button>
    </div>
  </div>

  <hr>

  <div class="item">
    <span>Rabatt (%)</span>
    <div class="controls">
      <button onclick="change('rabatt', -5)">-</button>
      <div class="value" id="rabattVal">0</div>
      <button onclick="change('rabatt', 5)">+</button>
    </div>
  </div>

  <div class="result" id="gesamt">Gesamt: 0$</div>
  <div class="result total" id="endpreis">Endpreis: 0$</div>
</div>

<!-- RECHTS -->
<div class="sidebar">
  <h2>Verkauf</h2>
  <div class="text" id="liste">Noch nichts verkauft</div>
</div>

</div>

<script>
let values = {
  pistole: 0,
  mk2: 0,
  deagle: 0,
  mp: 0,
  rabatt: 0
};

function change(item, amount) {
  values[item] += amount;

  if (values[item] < 0) values[item] = 0;
  if (item === "rabatt" && values[item] > 100) values[item] = 100;

  document.getElementById(item + "Val").innerText = values[item];
  berechnen();
}

function berechnen() {
  let gesamt =
    values.pistole * 55000 +
    values.mk2 * 65000 +
    values.deagle * 80000 +
    values.mp * 170000;

  let endpreis = gesamt - (gesamt * values.rabatt / 100);

  document.getElementById("gesamt").innerText =
    "Gesamt: " + gesamt.toLocaleString() + "$";

  document.getElementById("endpreis").innerText =
    "Endpreis: " + endpreis.toLocaleString() + "$";

  let text = [];

  if (values.pistole > 0) text.push(values.pistole + "x Pistole");
  if (values.mk2 > 0) text.push(values.mk2 + "x Pistole MK2");
  if (values.deagle > 0) text.push(values.deagle + "x Deagle");
  if (values.mp > 0) text.push(values.mp + "x Maschinen Pistole");

  document.getElementById("liste").innerText =
    text.length ? text.join("\n") + "\n\nRabatt: " + values.rabatt + "%" : "Noch nichts verkauft";
}
</script>

</body>
</html>
